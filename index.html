<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroAGI — მონაწილეობა</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #222; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #fff; border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 500px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
.card h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 4px; }
.card .sub { color: #888; font-size: 13px; margin-bottom: 28px; }
.fg { margin-bottom: 16px; }
.fg label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
.fg input, .fg select { width: 100%; padding: 10px 13px; border: 1.5px solid #ddd; border-radius: 7px; font-size: 14px; outline: none; transition: border 0.2s; background: #fff; color: #222; }
.fg input:focus, .fg select:focus { border-color: #e94560; }
.btn { width: 100%; padding: 12px; background: #e94560; color: #fff; border: none; border-radius: 7px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: background 0.2s; }
.btn:hover { background: #c73250; }
.btn:disabled { background: #ccc; cursor: not-allowed; }
.ok { display: none; margin-top: 14px; padding: 12px 16px; background: #e8f5e9; border: 1.5px solid #66bb6a; color: #2e7d32; border-radius: 7px; font-size: 13px; text-align: center; }
.err { display: none; margin-top: 14px; padding: 12px 16px; background: #ffebee; border: 1.5px solid #ef9a9a; color: #b71c1c; border-radius: 7px; font-size: 13px; text-align: center; }
.logo { font-size: 13px; color: #aaa; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Synexia · MicroAGI Georgia</div>
  <h1>მონაწილეობა</h1>
  <p class="sub">შეავსე ფორმა და ჩვენი გუნდი დაგიკავშირდება მოკლე დროში.</p>
  <div class="fg"><label>სახელი და გვარი *</label><input type="text" id="fn" placeholder="გიორგი ბერიძე"></div>
  <div class="fg"><label>ტელეფონი *</label><input type="tel" id="fp" placeholder="+995 5XX XXX XXX"></div>
  <div class="fg"><label>ელ-ფოსტა</label><input type="email" id="fe" placeholder="example@gmail.com"></div>
  <div class="fg"><label>ასაკი *</label><input type="number" id="fa" placeholder="25" min="16" max="70"></div>
  <div class="fg"><label>საიდან გაიგე ჩვენ შესახებ?</label>
    <select id="fs">
      <option value="facebook">Facebook</option>
      <option value="instagram">Instagram</option>
      <option value="tiktok">TikTok</option>
      <option value="direct">სხვა</option>
    </select>
  </div>
  <button class="btn" id="submit-btn" onclick="submitForm()">გაგზავნა →</button>
  <div class="ok" id="ok-msg">✅ მიღებულია! მოკლე დროში დაგიკავშირდებით.</div>
  <div class="err" id="err-msg">❌ შეცდომა. სცადე კიდევ ერთხელ.</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbypIML5MhQeDmCBfIFByUqsE917icoiPBuMwc95vMJwk-xLeOPWgI0a8bStx4Gu-OUlbQ/exec";

async function submitForm() {
  const name = document.getElementById('fn').value.trim();
  const phone = document.getElementById('fp').value.trim();
  const age = document.getElementById('fa').value.trim();
  if (!name || !phone || !age) { alert('შეავსე სავალდებულო ველები'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'იგზავნება...';

  try {
    const url = new URL(API);
    url.searchParams.set('action', 'addLead');
    url.searchParams.set('name', name);
    url.searchParams.set('phone', phone);
    url.searchParams.set('email', document.getElementById('fe').value.trim());
    url.searchParams.set('age', age);
    url.searchParams.set('source', document.getElementById('fs').value);
    await fetch(url.toString(), { redirect: 'follow' });

    ['fn','fp','fe','fa'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('ok-msg').style.display = 'block';
    setTimeout(() => document.getElementById('ok-msg').style.display = 'none', 4000);
  } catch(e) {
    document.getElementById('err-msg').style.display = 'block';
    setTimeout(() => document.getElementById('err-msg').style.display = 'none', 4000);
  }
  btn.disabled = false;
  btn.textContent = 'გაგზავნა →';
}
</script>
</body>
</html>
